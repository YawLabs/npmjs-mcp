version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    groups:
      # Batch all security (vulnerability) updates into one PR per run instead
      # of one PR per advisory, so security fixes arrive grouped.
      security:
        applies-to: security-updates
        patterns:
          - "*"
      # Group minor + patch dev-dep updates so we get one PR per week instead
      # of four. Majors stay ungrouped — each gets its own PR so we can review
      # breaking changes (Biome config migrations, TS/Zod API shifts) one at a
      # time instead of a bundled "four majors at once" review.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
