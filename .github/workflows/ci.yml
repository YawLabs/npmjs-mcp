name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      # No separate build step: `npm test` is `npm run build && node --test
      # dist/...test.js`, so adding `- run: npm run build` here would compile
      # twice per CI job for no extra signal -- the second build catches the
      # same errors as the first.
      - run: npm test
