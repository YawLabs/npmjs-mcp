name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Lint, build, and test are also run inside release.sh, but we expose them as
      # discrete GitHub Actions steps so failures show a clear step name (e.g. "Test")
      # in the workflow UI instead of being buried inside the Release step logs.
      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Release
        run: bash release.sh
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Post-publish smoke test: the release is live on npm, so we confirm that
      # a fresh install via npx can execute the binary and respond to --version.
      # Catches packaging regressions (missing bin shebang, bad "files" entry,
      # broken esbuild output) before they hit real users.
      - name: Smoke test published package
        # Run npx from a temp dir — if run from the checkout root, npx sees our
        # own package.json `bin` entry and tries to resolve the local (unbuilt)
        # path instead of installing the published tarball.
        working-directory: ${{ runner.temp }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Registry propagation can lag a few seconds after publish succeeds.
          for i in 1 2 3 4 5; do
            if npm view "@yawlabs/npmjs-mcp@${VERSION}" version >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for @yawlabs/npmjs-mcp@${VERSION} to appear on the registry (attempt $i)..."
            sleep 5
          done
          OUTPUT=$(npx -y "@yawlabs/npmjs-mcp@${VERSION}" --version)
          echo "npx output: $OUTPUT"
          if [ "$OUTPUT" != "$VERSION" ]; then
            echo "Expected $VERSION, got $OUTPUT" >&2
            exit 1
          fi
